name: 🤖 BTC Auto-Trader — Hyperliquid Testnet

on:
  schedule:
    # Ejecuta cada 4 horas: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (analizar sin abrir orden)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  trade-btc:
    name: Analizar y ejecutar en Hyperliquid Testnet
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 📊 Obtener datos BTC + Liquidaciones
        id: fetch_data
        run: python scripts/fetch_data.py
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}

      - name: 🧠 Analizar con Claude AI
        id: analyze
        run: python scripts/analyze_with_claude.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 🚀 Ejecutar orden en Hyperliquid Testnet
        id: execute
        run: python scripts/execute_hyperliquid.py
        env:
          HL_PRIVATE_KEY: ${{ secrets.HL_PRIVATE_KEY }}
          HL_WALLET_ADDRESS: ${{ secrets.HL_WALLET_ADDRESS }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: 💾 Guardar logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-log-${{ github.run_number }}
          path: output/
          retention-days: 60
